name: Build unattend.iso

on:
  workflow_dispatch:
  push:
    branches:
      - media

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build media.iso
        run: |
          chmod +x ./scripts/build-media-iso.sh
          ./scripts/build-media-iso.sh "${GITHUB_REF_NAME}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: media-files
          path: |
            media.iso
            media.iso.sha256
            media.version.txt
name: Build media.iso

on:
  workflow_dispatch:
  push:
    tags:
      - 'media-*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build media.iso
        run: |
          chmod +x ./scripts/build-media-iso.sh
          ./scripts/build-media-iso.sh "${GITHUB_REF_NAME}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: media-files
          path: |
            media.iso
            media.iso.sha256
            media.version.txt

      - name: Publish media release
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/media-')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/media-') && github.ref_name || 'media-latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/media-') && format('Media ISO ({0})', github.ref_name) || 'Media ISO (latest)' }}
          prerelease: true
          make_latest: false
          files: |
            media.iso
            media.iso.sha256
            media.version.txt
          body: |
            Automated media ISO build from `${{ github.ref_name }}`.
            Commit: `${{ github.sha }}`
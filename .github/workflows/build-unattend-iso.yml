name: Build unattend.iso

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install genisoimage
        run: |
          sudo apt-get update
          sudo apt-get install -y genisoimage

      - name: Build unattend.iso
        run: |
          mkdir -p iso-root
          cp autounattend.xml iso-root/autounattend.xml
          echo "${GITHUB_REF_NAME}" > iso-root/version.txt
          genisoimage \
            -o unattend.iso \
            -J -R \
            iso-root

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: unattend-iso
          path: unattend.iso

      - name: Create GitHub release and attach ISO
        uses: softprops/action-gh-release@v2
        with:
          files: unattend.iso
          generate_release_notes: true
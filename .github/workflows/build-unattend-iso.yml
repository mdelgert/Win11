name: Build unattend.iso

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build unattend.iso
        run: |
          chmod +x ./scripts/build-unattend-iso.sh
          ./scripts/build-unattend-iso.sh "${GITHUB_REF_NAME}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unattend-files
          path: |
            unattend.iso
            unattend.iso.sha256
            unattend.version.txt

      - name: Create GitHub release and attach files
        uses: softprops/action-gh-release@v2
        with:
          files: |
            unattend.iso
            unattend.iso.sha256
            unattend.version.txt
          generate_release_notes: true
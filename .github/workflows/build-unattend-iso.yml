name: Build unattend.iso

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install genisoimage
        run: |
          sudo apt-get update
          sudo apt-get install -y genisoimage

      - name: Build unattend.iso
        run: |
          mkdir -p iso-root
          cp autounattend.xml iso-root/autounattend.xml
          echo "${GITHUB_REF_NAME}" > iso-root/version.txt

          mkdir -p iso-root/repo
          rsync -av ./ iso-root/repo/ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'iso-root' \
            --exclude '*.iso' \
            --exclude '*.zip'

          genisoimage \
            -o unattend.iso \
            -J -R \
            iso-root

      - name: Generate version file
        run: |
          echo "${GITHUB_REF_NAME}" > unattend.version.txt

      - name: Generate SHA256 checksum
        run: |
          sha256sum unattend.iso > unattend.iso.sha256

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unattend-files
          path: |
            unattend.iso
            unattend.iso.sha256
            unattend.version.txt

      - name: Create GitHub release and attach files
        uses: softprops/action-gh-release@v2
        with:
          files: |
            unattend.iso
            unattend.iso.sha256
            unattend.version.txt
          generate_release_notes: true
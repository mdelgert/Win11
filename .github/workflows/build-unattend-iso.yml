name: Build unattend.iso

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - autounattend.xml
      - .github/workflows/build-unattend-iso.yml
      
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install genisoimage
        run: |
          sudo apt-get update
          sudo apt-get install -y genisoimage

      - name: Build unattend.iso
        run: |
          mkdir -p iso-root
          cp autounattend.xml iso-root/autounattend.xml
          genisoimage \
            -o unattend.iso \
            -J -R \
            iso-root

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unattend-iso
          path: unattend.iso